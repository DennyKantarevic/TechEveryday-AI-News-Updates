name: Daily TechEveryday Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh route
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/refresh-news?scheduled=1"
